<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi de Production</title>
<link rel="stylesheet" href="suivi.css">
</head>
<body>
<div class="topbar">
  <div>
    <h1>Pilotage M00</h1>
    <div class="subtitle">Mise à jour quotidienne</div>
  </div>
  <div class="date-box">
    <label for="dateJour">Date du jour :</label>
    <input type="date" id="dateJour">
  </div>
  <span id="fbStatus" class="sync">⏳ Connexion...</span>
  <div id="userBadge" style="display:none">
    <span id="userEmail"></span>
    <button id="btnLogout" onclick="doLogout()">Déconnexion</button>
  </div>
  <button class="btn-print btn" onclick="window.print()">Imprimer</button>
</div>

<!-- Onglets principaux -->
<div class="main-tabs" id="mainTabs">
  <button class="main-tab active" id="tabViewSuivi" onclick="switchMainTab('suivi')">Supermarché</button>
  <button class="main-tab" id="tabViewManquants" onclick="switchMainTab('manquants')">
    Rassemblement <span class="badge-count" id="manquantsCount" style="display:none">0</span>
  </button>
  <button class="main-tab" id="tabViewActions" onclick="switchMainTab('actions')">
    Actions <span class="badge-count" id="actionsCount" style="display:none">0</span>
  </button>
  <button class="main-tab" id="tabViewUsers" style="display:none" onclick="switchMainTab('users')">Utilisateurs</button>
</div>

<!-- Vue : Supermarché -->
<div class="view-panel active" id="panelSuivi">
  <div class="wrap">
    <table id="mainTable">
      <thead id="thead">
        <tr id="headerRow">
          <th class="th-top th-label" style="width:110px"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="bottombar">
    <button class="btn btn-danger"  onclick="resetAll()">Réinitialiser</button>
    <button class="btn btn-ghost"   onclick="exportCSV()">Exporter CSV</button>
    <button class="btn btn-ghost"   onclick="openHistorique()">📋 Historique</button>
    <button class="btn btn-primary" onclick="addSynthCol()">+ Ajouter colonne synthèse</button>
    <button class="btn btn-primary" onclick="saveFirebase()">Sauvegarder</button>
    <button class="btn btn-ghost"   onclick="openChart()">Graphiques</button>
  </div>
</div>

<!-- Vue : Rassemblement (articles manquants groupés par date) -->
<div class="view-panel" id="panelManquants">
  <div class="rassemblement-sections" id="rassemblementSections"></div>
  <div class="manquants-toolbar">
    <button class="btn btn-primary" onclick="addRassemSection()">+ Ajouter une date</button>
    <button class="btn btn-ghost" id="btnToggleRecus" onclick="toggleShowRecus()">👁 Afficher les reçus</button>
    <button class="btn btn-ghost" onclick="exportManquantsCSV()">Exporter CSV</button>
    <button class="btn btn-ghost" onclick="openStats()">📊 Statistiques</button>
    <button class="btn btn-ghost" onclick="printRassemblement()">🖨 Imprimer cette page</button>
    <button class="btn btn-primary" onclick="saveFirebase()">Sauvegarder</button>
  </div>
</div>

<!-- Vue : Actions (remarques envoyées depuis le tableau Supermarché) -->
<div class="view-panel" id="panelActions">
  <div class="actions-toolbar-top">
    <select class="actions-filter-select" id="actionsFilterPoste"></select>
    <select class="actions-filter-select" id="actionsFilterSection"></select>
    <button class="btn btn-ghost" id="btnToggleActionsDone" onclick="toggleShowDoneActions()">👁 Afficher les faites</button>
    <button class="btn btn-ghost" onclick="exportActionsCSV()">Exporter CSV</button>
    <button class="btn btn-primary" onclick="saveFirebase()">Sauvegarder</button>
  </div>
  <div class="actions-table-wrap" id="actionsTableWrap"></div>
</div>

<!-- Vue : Utilisateurs (gestion des rôles, réservée aux Administrateurs) -->
<div class="view-panel" id="panelUsers">
  <div class="users-table-wrap" id="usersTableWrap"></div>
</div>

<!-- Modal Graphique (Supermarché) -->
<div class="modal-overlay" id="chartOverlay">
  <div class="modal-box">
    <button class="close-btn" onclick="closeChart()">&#x2715;</button>
    <h2 id="chartTitle">Taux de réalisation APPROS</h2>
    <div class="chart-tabs" id="sectionTabs">
      <button class="chart-tab active" id="secAPPROS" onclick="switchSection('APPROS')">APPROS</button>
      <button class="chart-tab" id="secPIECES_DEPOSEES" onclick="switchSection('PIECES DEPOSEES')">PIECES DEPOSEES</button>
    </div>
    <div class="chart-tabs">
      <button class="chart-tab active" id="tabCourant" onclick="switchTab('courant')">Vue courante (4 jours)</button>
      <button class="chart-tab" id="tabHistorique" onclick="switchTab('historique')">Historique complet</button>
    </div>
    <canvas class="chart-canvas" id="approsChart" height="320"></canvas>
  </div>
</div>

<!-- Modal Historique -->
<div class="modal-overlay" id="histOverlay">
  <div class="modal-box">
    <button class="close-btn" onclick="closeHistorique()">&#x2715;</button>
    <h2>Historique des sauvegardes</h2>
    <div class="hist-toolbar">
      <label>Du :</label>
      <input type="date" id="histFrom">
      <label>Au :</label>
      <input type="date" id="histTo">
      <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="renderHistTable()">Filtrer</button>
      <button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="clearHistFilter()">Tout afficher</button>
    </div>
    <div class="hist-table-wrap" id="histTableWrap"></div>
  </div>
</div>

<!-- Modal Statistiques Rassemblement -->
<div class="modal-overlay" id="statsOverlay">
  <div class="modal-box modal-box-stats">
    <button class="close-btn" onclick="closeStats()">&#x2715;</button>
    <h2>📊 Statistiques Rassemblement</h2>

    <div class="stats-tabs">
      <button class="stats-tab active" id="statsTab_global"  onclick="switchStatsTab('global')">Vue globale</button>
      <button class="stats-tab"        id="statsTab_delais"  onclick="switchStatsTab('delais')">Délais</button>
      <button class="stats-tab"        id="statsTab_engins"  onclick="switchStatsTab('engins')">Par engin</button>
      <button class="stats-tab"        id="statsTab_cadence" onclick="switchStatsTab('cadence')">Cadence</button>
      <button class="stats-tab"        id="statsTab_top"     onclick="switchStatsTab('top')">Top articles</button>
    </div>

    <div class="stats-panel active" id="statsPanel_global"></div>
    <div class="stats-panel"        id="statsPanel_delais"></div>
    <div class="stats-panel"        id="statsPanel_engins"></div>
    <div class="stats-panel"        id="statsPanel_cadence"></div>
    <div class="stats-panel"        id="statsPanel_top"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
